<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heart Disease Predictor ❤️</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 15px;
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Heart Disease Predictor ❤️</h2>

  <input id="age" placeholder="Age">
  <input id="sex" placeholder="Sex (0/1)">
  <input id="cp" placeholder="Chest Pain (0-3)">
  <input id="trestbps" placeholder="Rest BP">
  <input id="chol" placeholder="Cholesterol">
  <input id="fbs" placeholder="FBS (0/1)">
  <input id="restecg" placeholder="Rest ECG (0-2)">
  <input id="thalach" placeholder="Max Heart Rate">
  <input id="exang" placeholder="Exercise Angina (0/1)">
  <input id="oldpeak" placeholder="Oldpeak">
  <input id="slope" placeholder="Slope (0-2)">
  <input id="ca" placeholder="CA (0-4)">
  <input id="thal" placeholder="Thal (0-3)">

  <button onclick="predict()">Predict</button>

  <div class="result" id="result"></div>
</div>

<script>
async function predict() {
  const data = {
    age: Number(document.getElementById("age").value),
    sex: Number(document.getElementById("sex").value),
    cp: Number(document.getElementById("cp").value),
    trestbps: Number(document.getElementById("trestbps").value),
    chol: Number(document.getElementById("chol").value),
    fbs: Number(document.getElementById("fbs").value),
    restecg: Number(document.getElementById("restecg").value),
    thalach: Number(document.getElementById("thalach").value),
    exang: Number(document.getElementById("exang").value),
    oldpeak: Number(document.getElementById("oldpeak").value),
    slope: Number(document.getElementById("slope").value),
    ca: Number(document.getElementById("ca").value),
    thal: Number(document.getElementById("thal").value)
  };

  try {
    const response = await fetch("http://127.0.0.1:8000/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerHTML =
      `Prediction: <b>${result.result}</b><br>
       Probability: ${result.probability || "N/A"}`;

  } catch (error) {
    document.getElementById("result").innerText = "Error connecting to API";
  }
}
</script>

</body>
</html>
