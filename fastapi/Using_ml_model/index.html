<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insurance Premium Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Insurance Premium Predictor</h1>
    <p class="subtitle">Fill in your details to predict your premium</p>

    <form id="predictForm">
        <div class="grid">

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" required min="1" max="119">
            </div>

            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" step="0.1" name="weight" required>
            </div>

            <div class="form-group">
                <label>Height (m)</label>
                <input type="number" step="0.01" name="height" required>
            </div>

            <div class="form-group">
                <label>Income (LPA)</label>
                <input type="number" step="0.1" name="income_lpa" required>
            </div>

            <div class="form-group">
                <label>Smoker</label>
                <select name="smoker" required>
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" required>
            </div>

            <div class="form-group full">
                <label>Occupation</label>
                <select name="occupation" required>
                    <option value="private_job">Private Job</option>
                    <option value="government_job">Government Job</option>
                    <option value="business_owner">Business Owner</option>
                    <option value="freelancer">Freelancer</option>
                    <option value="student">Student</option>
                    <option value="retired">Retired</option>
                    <option value="unemployed">Unemployed</option>
                </select>
            </div>

        </div>

        <button type="submit">Predict Premium</button>
    </form>

    <div id="result" class="result"></div>
</div>

<script>
document.getElementById("predictForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const data = {
        age: Number(formData.get("age")),
        weight: Number(formData.get("weight")),
        height: Number(formData.get("height")),
        income_lpa: Number(formData.get("income_lpa")),
        smoker: formData.get("smoker") === "true",
        city: formData.get("city"),
        occupation: formData.get("occupation")
    };

    const response = await fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    document.getElementById("result").innerHTML =
        `<h2>Predicted Premium:  ${result.predicted}</h2>`;
});
</script>

</body>
</html>
